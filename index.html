<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Ferguson Zibiri">
        <meta name="description" content="My first web page">
        <meta name="keywords" content="html, css, web, web development, javascript">
        <link rel="stylesheet" href="./assets/styles/style.css">
        <link rel="icon" href="./assets/media/icon_F.png?v=2" type="image/x-icon">
        <script src="./assets/scripts/app.js" defer></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <title>Fakebook</title>
    </head>
    <body>
        <header>
            <div class="first-header">
                <h2>Fakebook</h2>
            </div>
            <div class="mid-header">
                <p>Friends</p>
                <p>Pages</p>
                <p>Groups</p>
                <p>My Ads</p>
                <p>Settings</p>
            </div>
            <div class="end-header">
                <i class="fa-regular fa-user"></i>
            </div>
        </header>
        <main>
            <div class="container">
                <div class="area">
                    <form>
                        <textarea class="input"></textarea>
                        <div class="bottom">
                            <div class="didi">
                                <input type="file" id="imageUpload" accept="image/*">
                            </div>
                        </div>
                    </form>
                    <button class="post-btn">Post</button>
                </div>
            </div>
            <div class="overlay">
                <div class="pop-up">
                    <div class="end-header">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <div class="pop-text">
                        
                    </div>
                    <button class="close">Close</button>
                </div>
            </div>
        </main>
    </body>
</html>
